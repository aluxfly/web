<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteFlow Lite - 智能笔记整理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tag { @apply inline-block px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded-full mr-1 mb-1; }
        .tag:hover { @apply bg-blue-200 cursor-pointer; }
        .note-card { @apply p-4 border rounded-lg mb-3 hover:shadow-md transition; }
        textarea { @apply w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent; }
        .loading { @apply inline-block animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📝 NoteFlow Lite</h1>
            <p class="text-gray-600 mt-2">保存链接或文本，自动分类，快速搜索</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left: Input & Controls -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Input Section -->
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <h2 class="text-lg font-semibold mb-4">➕ 添加笔记</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">类型</label>
                        <div class="flex gap-2">
                            <button id="type-text" class="px-4 py-2 bg-blue-500 text-white rounded-lg flex-1" onclick="setInputType('text')">📄 文本</button>
                            <button id="type-link" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg flex-1" onclick="setInputType('link')">🔗 链接</button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">标题（可选）</label>
                        <input type="text" id="note-title" class="w-full p-2 border rounded-lg" placeholder="自动生成或手动填写">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2" id="content-label">内容</label>
                        <textarea id="note-content" rows="6" class="w-full p-2 border rounded-lg" placeholder="输入文本或粘贴链接..."></textarea>
                        <div id="link-preview" class="mt-2 p-3 bg-gray-100 rounded-lg hidden">
                            <p class="text-sm text-gray-600">🔗 链接预览</p>
                            <p id="preview-title" class="font-medium mt-1 text-blue-600"></p>
                            <p id="preview-url" class="text-blue-500 text-sm break-all mt-1 cursor-pointer hover:underline" onclick="window.open(this.textContent, '_blank')"></p>
                        </div>
                    </div>

                    <button onclick="saveNote()" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2">
                        <span>💾 保存笔记</span>
                        <span id="save-indicator" class="hidden loading"></span>
                    </button>

                    <div class="mt-3 text-sm text-gray-500">
                        <p>📊 已保存: <span id="note-count">0</span> 条笔记</p>
                        <p>🏷️ 标签数: <span id="tag-count">0</span> 个</p>
                    </div>
                </div>

                <!-- API Configuration REMOVED -->
            </div>

            <!-- Right: Notes List & Search -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Search -->
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <div class="flex gap-4 items-center">
                        <div class="flex-1 relative">
                            <input type="text" id="search-input" oninput="filterNotes()" class="w-full p-3 pl-10 border rounded-lg" placeholder="🔍 搜索笔记内容、标题或标签...">
                            <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
                        </div>
                        <button onclick="clearSearch()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">清除</button>
                    </div>

                    <!-- Tag Filter -->
                    <div class="mt-4 flex flex-wrap gap-2" id="tag-filter">
                        <span class="text-sm text-gray-600 py-1">🏷️ 点击标签筛选：</span>
                    </div>
                </div>

                <!-- Notes List -->
                <div id="notes-container" class="space-y-4">
                    <!-- Notes will be rendered here -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="text-center py-12 text-gray-500 hidden">
                    <div class="text-6xl mb-4">📭</div>
                    <p class="text-lg">暂无笔记</p>
                    <p class="text-sm mt-2">添加第一条笔记吧！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =====================
        // Data & State
        // =====================
        let notes = JSON.parse(localStorage.getItem('noteflow-notes') || '[]');
        let currentFilter = { search: '', tag: null };
        let inputType = 'text'; // 'text' or 'link'

        // =====================
        // UI Functions
        // =====================
        function setInputType(type) {
            inputType = type;
            const btnText = document.getElementById('type-text');
            const btnLink = document.getElementById('type-link');
            const label = document.getElementById('content-label');
            const textarea = document.getElementById('note-content');
            const titleInput = document.getElementById('note-title');

            if (type === 'text') {
                btnText.className = 'px-4 py-2 bg-blue-500 text-white rounded-lg flex-1';
                btnLink.className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded-lg flex-1';
                label.textContent = '内容';
                textarea.placeholder = '输入笔记内容...';
                titleInput.placeholder = '标题（可选）';
            } else {
                btnText.className = 'px-4 py-2 bg-gray-200 text-gray-700 rounded-lg flex-1';
                btnLink.className = 'px-4 py-2 bg-blue-500 text-white rounded-lg flex-1';
                label.textContent = '链接地址';
                textarea.placeholder = '粘贴网址（如 https://example.com/article）...';
                titleInput.placeholder = '留空则自动抓取标题';
            }
        }

        // =====================
        // Link Fetching (CORS Proxy)
        // =====================
        async function fetchUrlPreview(url) {
            const indicator = document.getElementById('save-indicator');
            indicator.classList.remove('hidden');

            try {
                // Use CORS proxy (public)
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl, { timeout: 10000 });

                if (!response.ok) throw new Error('Network response was not ok');

                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Extract title
                let title = doc.querySelector('title')?.textContent?.trim() || '';
                // Fallback: use H1
                if (!title) title = doc.querySelector('h1')?.textContent?.trim() || '';

                // Extract meta description
                const metaDesc = doc.querySelector('meta[name="description"]')?.content || '';

                // Remove script, style, nav, footer
                const body = doc.querySelector('body');
                if (body) {
                    ['script', 'style', 'nav', 'footer', 'header', 'aside'].forEach(tag => {
                        body.querySelectorAll(tag).forEach(el => el.remove());
                    });
                }

                // Extract text content (first 500 chars)
                const textContent = body?.textContent?.replace(/\s+/g, ' ').trim().slice(0, 500) || '';

                const preview = {
                    title: title || url,
                    description: metaDesc || textContent,
                    url: url
                };

                indicator.classList.add('hidden');
                return preview;
            } catch (error) {
                console.error('Fetch error:', error);
                indicator.classList.add('hidden');
                // Fallback: just use URL as title
                return {
                    title: url,
                    description: '无法抓取内容（CORS限制或页面不可访问）',
                    url: url
                };
            }
        }

        // Link paste handler
        document.getElementById('note-content').addEventListener('paste', async function(e) {
            if (inputType !== 'link') return;

            const text = e.clipboardData.getData('text');
            const urlMatch = text.match(/https?:\/\/[^\s]+/);

            if (urlMatch) {
                const url = urlMatch[0];
                this.value = url;

                // Show preview
                const preview = await fetchUrlPreview(url);
                const previewDiv = document.getElementById('link-preview');
                document.getElementById('preview-title').textContent = preview.title;
                document.getElementById('preview-url').textContent = preview.url;
                previewDiv.classList.remove('hidden');

                // Auto-set title if empty
                if (!document.getElementById('note-title').value) {
                    document.getElementById('note-title').value = preview.title;
                }
            }
        });

        // =====================
        // AI Tag Generation (Simulation + Real API)
        // =====================
        function generateTags(content, title) {
            const text = (title + ' ' + content).toLowerCase();

            const keywordTags = [];
            const keywordMap = {
                '人工智能': ['ai', '人工智能', '机器学习', '深度学习', 'gpt', 'llm', '模型', '神经网络'],
                '编程': ['代码', '编程', 'javascript', 'python', 'java', 'go', 'rust', '开发', '程序', '软件'],
                '产品': ['产品', '需求', 'prd', '用户', '体验', '设计', '产品经理', '原型'],
                '笔记': ['笔记', 'noteflow', '知识管理', '整理', '分类', '学习笔记', '读书笔记'],
                '新闻': ['新闻', '资讯', '报道', '消息', '公告', '动态'],
                '工具': ['工具', '效率', '软件', '应用', 'app', '实用', '小工具'],
                '文档': ['文档', '说明', '指南', '教程', '文章', '博客'],
                '数据': ['数据', '分析', '统计', '报表', '数据库'],
                '运营': ['运营', '市场', '推广', '用户增长', '营销']
            };

            for (const [tag, keywords] of Object.entries(keywordMap)) {
                if (keywords.some(k => text.includes(k))) {
                    keywordTags.push(tag);
                }
            }

            if (keywordTags.length === 0) {
                keywordTags.push('未分类');
            }

            return keywordTags.slice(0, 5);
        }

        // =====================
        // CRUD Operations
        // =====================
        function saveNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            const title = titleInput.value.trim() || '无标题';
            const content = contentInput.value.trim();

            if (!content) {
                alert('请输入内容或链接');
                return;
            }

            const note = {
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                title: title,
                content: content,
                tags: [], // Will be filled asynchronously
                createdAt: Date.now(),
                type: inputType
            };

            // Save immediately
            notes.unshift(note);
            localStorage.setItem('noteflow-notes', JSON.stringify(notes));

            // Clear input
            titleInput.value = '';
            contentInput.value = '';
            document.getElementById('link-preview').classList.add('hidden');

            // Generate tags asynchronously
            generateTagsAsync(note);

            // Refresh UI
            renderNotes();
            updateStats();
        }

        async function generateTagsAsync(note) {
            const tags = generateTags(note.content, note.title);
            note.tags = tags;

            // Update in storage
            const index = notes.findIndex(n => n.id === note.id);
            if (index !== -1) {
                notes[index].tags = tags;
                localStorage.setItem('noteflow-notes', JSON.stringify(notes));
            }

            renderNotes();
        }

        function deleteNote(id) {
            if (confirm('确定删除这条笔记？')) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('noteflow-notes', JSON.stringify(notes));
                renderNotes();
                updateStats();
            }
        }

        // =====================
        // Search & Filter
        // =====================
        function filterNotes() {
            const query = document.getElementById('search-input').value.toLowerCase();
            currentFilter.search = query;
            renderNotes();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentFilter.search = '';
            currentFilter.tag = null;
            renderNotes();
        }

        function filterByTag(tag) {
            if (currentFilter.tag === tag) {
                currentFilter.tag = null;
            } else {
                currentFilter.tag = tag;
            }
            renderNotes();
        }

        // =====================
        // Rendering
        // =====================
        function renderNotes() {
            const container = document.getElementById('notes-container');
            const emptyState = document.getElementById('empty-state');

            let filtered = notes.filter(note => {
                // Search filter
                if (currentFilter.search) {
                    const searchIn = (note.title + note.content + note.tags.join(' ')).toLowerCase();
                    if (!searchIn.includes(currentFilter.search)) return false;
                }

                // Tag filter
                if (currentFilter.tag && !note.tags.includes(currentFilter.tag)) {
                    return false;
                }

                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            container.innerHTML = filtered.map(note => `
                <div class="note-card bg-white">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-bold text-gray-800 flex-1">
                            ${note.type === 'link' && note.content
                                ? `<a href="${escapeHtml(note.content)}" target="_blank" class="text-blue-600 hover:underline">${escapeHtml(note.title)}</a>🔗`
                                : escapeHtml(note.title)}
                        </h3>
                        <button onclick="deleteNote('${note.id}')" class="text-red-500 hover:text-red-700 ml-2">🗑️</button>
                    </div>

                    <div class="text-sm text-gray-600 mb-3 max-h-32 overflow-y-auto">
                        ${escapeHtml(note.content.slice(0, 500))}${note.content.length > 500 ? '...' : ''}
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex flex-wrap" id="tags-${note.id}">
                            ${note.tags.map(tag => `
                                <span class="tag cursor-pointer" onclick="filterByTag('${tag}')">#${tag}</span>
                            `).join('')}
                        </div>
                        <span class="text-xs text-gray-400">${new Date(note.createdAt).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');

            // Update tag filter
            const allTags = new Set();
            notes.forEach(n => n.tags.forEach(t => allTags.add(t)));
            renderTagFilter(Array.from(allTags));
        }

        function renderTagFilter(tags) {
            const container = document.getElementById('tag-filter');
            container.innerHTML = tags.map(tag => `
                <span class="px-3 py-1 ${currentFilter.tag === tag ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700'} rounded-full text-sm cursor-pointer hover:bg-blue-200 transition" onclick="filterByTag('${tag}')">${tag}</span>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            document.getElementById('note-count').textContent = notes.length;

            const allTags = new Set();
            notes.forEach(n => n.tags.forEach(t => allTags.add(t)));
            document.getElementById('tag-count').textContent = allTags.size;
        }

        // =====================
        // Initialization
        // =====================
        document.addEventListener('DOMContentLoaded', () => {
            renderNotes();
            updateStats();
            renderTagFilter([]);

            // Auto-focus content
            document.getElementById('note-content').focus();
        });
    </script>
</body>
</html>
