<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务看板 - 实时任务跟踪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .column {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .column-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .column.in-progress .column-header {
            color: #FF6A00;
            border-bottom-color: #FF6A00;
        }
        
        .column.completed .column-header {
            color: #52C41A;
            border-bottom-color: #52C41A;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        
        .task-card:hover {
            transform: translateX(5px);
        }
        
        .task-card .task-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .task-card .task-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .task-card .agent-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .task-card .time {
            color: #999;
        }
        
        .task-card .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-badge.pending {
            background: #FFF7E6;
            color: #FA8C16;
        }
        
        .status-badge.processing {
            background: #E6F7FF;
            color: #1890FF;
        }
        
        .status-badge.done {
            background: #F6FFED;
            color: #52C41A;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .last-update {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 任务看板</h1>
            <p>实时跟踪任务状态和 Agent 工作负载</p>
            <button class="refresh-btn" onclick="loadTasks()">🔄 刷新数据</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalTasks">0</div>
                <div class="label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="pendingTasks">0</div>
                <div class="label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="value" id="completedTasks">0</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="value" id="activeAgents">0</div>
                <div class="label">活跃 Agent</div>
            </div>
        </div>
        
        <div class="board">
            <div class="column in-progress">
                <div class="column-header">🔄 进行中</div>
                <div id="inProgressTasks">
                    <div class="empty-state">暂无进行中任务</div>
                </div>
            </div>
            
            <div class="column completed">
                <div class="column-header">✅ 已完成</div>
                <div id="completedTasksList">
                    <div class="empty-state">暂无已完成任务</div>
                </div>
            </div>
        </div>
        
        <div class="last-update">
            <span id="lastUpdate">最后更新：-</span> | 
            数据源：<span id="dataSource">加载中...</span>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE_URL = 'http://172.19.1.131:8081/api'; // 服务器 IP:8081
        let tasks = [];
        let useLocalData = false; // 如果 API 不可用，使用本地数据
        
        // 从 API 加载任务
        async function loadTasks() {
            try {
                // 尝试从 API 加载
                const response = await fetch(`${API_BASE_URL}/tasks`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error('API 不可用');
                }
                
                const data = await response.json();
                
                if (data.success) {
                    tasks = data.tasks;
                    useLocalData = false;
                    console.log('✅ 从 API 加载任务成功:', tasks.length);
                } else {
                    throw new Error('API 返回失败');
                }
            } catch (error) {
                console.log('⚠️ API 加载失败，使用本地数据:', error.message);
                // API 不可用，使用本地数据
                loadLocalTasks();
            }
            
            renderTasks();
            updateStats();
            updateLastUpdateTime();
        }
        
        // 从本地加载任务（备用）
        function loadLocalTasks() {
            const saved = localStorage.getItem('taskBoard');
            if (saved) {
                tasks = JSON.parse(saved);
            } else {
                // 示例数据
                tasks = [
                    {
                        id: '1',
                        name: '任务清单网页美化',
                        agent: '设计官',
                        status: 'completed',
                        startTime: '2026-03-30 13:30',
                        endTime: '2026-03-30 13:45',
                        delivery: 'https://aluxfly.github.io/web/redesign/'
                    },
                    {
                        id: '2',
                        name: 'GitHub Pages 部署',
                        agent: '技术官',
                        status: 'completed',
                        startTime: '2026-03-30 11:00',
                        endTime: '2026-03-30 11:08',
                        delivery: 'https://aluxfly.github.io/web/'
                    },
                    {
                        id: '3',
                        name: '技能安装测试',
                        agent: '技术官',
                        status: 'processing',
                        startTime: '2026-03-30 14:00',
                        endTime: null
                    }
                ];
            }
            useLocalData = true;
        }
        
        // 渲染任务
        function renderTasks() {
            const inProgressContainer = document.getElementById('inProgressTasks');
            const completedContainer = document.getElementById('completedTasksList');
            
            const inProgress = tasks.filter(t => t.status === 'processing' || t.status === 'pending');
            const completed = tasks.filter(t => t.status === 'completed').slice(0, 10); // 只显示最近 10 个
            
            inProgressContainer.innerHTML = inProgress.length > 0 
                ? inProgress.map(task => createTaskCard(task)).join('')
                : '<div class="empty-state">暂无进行中任务</div>';
            
            completedContainer.innerHTML = completed.length > 0
                ? completed.map(task => createTaskCard(task, true)).join('')
                : '<div class="empty-state">暂无已完成任务</div>';
        }
        
        // 创建任务卡片
        function createTaskCard(task, showDelivery = false) {
            const statusClass = task.status === 'pending' ? 'pending' : 
                               task.status === 'processing' ? 'processing' : 'done';
            const statusText = task.status === 'pending' ? '待开始' :
                              task.status === 'processing' ? '进行中' : '已完成';
            
            let html = `
                <div class="task-card">
                    <div class="task-name">${task.name}</div>
                    <div class="task-meta">
                        <span class="agent-badge">${task.agent}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        <span class="time">🕐 ${task.startTime}</span>
            `;
            
            if (task.endTime && showDelivery) {
                html += `<span class="time">✅ ${task.endTime}</span>`;
            }
            
            if (task.delivery && showDelivery) {
                html += `<span class="time">🔗 <a href="${task.delivery}" target="_blank">查看</a></span>`;
            }
            
            html += `</div></div>`;
            return html;
        }
        
        // 更新统计
        function updateStats() {
            const total = tasks.length;
            const pending = tasks.filter(t => t.status === 'pending').length;
            const processing = tasks.filter(t => t.status === 'processing').length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('pendingTasks').textContent = pending + processing;
            document.getElementById('completedTasks').textContent = completed;
            
            const uniqueAgents = new Set(tasks.map(t => t.agent)).size;
            document.getElementById('activeAgents').textContent = uniqueAgents;
            
            // 显示数据源
            const dataSource = document.getElementById('dataSource');
            if (dataSource) {
                dataSource.textContent = useLocalData ? '本地数据' : '实时 API';
            }
        }
        
        // 更新最后更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `最后更新：${now.toLocaleString('zh-CN')}`;
        }
        
        // 添加任务（用于测试）
        function addTask(name, agent) {
            const task = {
                id: Date.now().toString(),
                name: name,
                agent: agent,
                status: 'processing',
                startTime: new Date().toLocaleString('zh-CN'),
                endTime: null
            };
            tasks.unshift(task);
            localStorage.setItem('taskBoard', JSON.stringify(tasks));
            loadTasks();
        }
        
        // 完成任务（用于测试）
        function completeTask(taskId, delivery) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = 'completed';
                task.endTime = new Date().toLocaleString('zh-CN');
                task.delivery = delivery;
                localStorage.setItem('taskBoard', JSON.stringify(tasks));
                loadTasks();
            }
        }
        
        // 初始化
        loadTasks();
        
        // 每 30 秒自动刷新
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
