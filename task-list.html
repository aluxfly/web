<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ن»»هٹ،و¸…هچ• - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .add-task {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .add-task form {
            display: flex;
            gap: 10px;
        }
        
        .add-task input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .add-task input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .add-task button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .add-task button:hover {
            transform: scale(1.05);
        }
        
        .task-list {
            padding: 20px 30px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            background: #f0f1f2;
        }
        
        .task-item.completed {
            background: #e8f5e9;
            opacity: 0.7;
        }
        
        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #888;
        }
        
        .task-time {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .task-time span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .task-time .start-time {
            color: #667eea;
        }
        
        .task-time .end-time {
            color: #4caf50;
        }
        
        .delete-btn {
            padding: 6px 12px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .task-item:hover .delete-btn {
            opacity: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .stats {
            padding: 16px 30px;
            background: #f8f9fa;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #666;
        }
        
        .stats span strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ًں“‹ ن»»هٹ،و¸…هچ•</h1>
            <p>è®°ه½•و¯ڈن¸€ن¸ھن»»هٹ،çڑ„ه¼€ه§‹ن¸ژç»“و‌ں</p>
        </div>
        
        <div class="add-task">
            <form id="taskForm">
                <input type="text" id="taskInput" placeholder="è¾“ه…¥و–°ن»»هٹ،..." required>
                <button type="submit">و·»هٹ </button>
            </form>
        </div>
        
        <div class="task-list" id="taskList">
            <!-- ن»»هٹ،هˆ—è،¨ه°†هœ¨è؟™é‡Œو¸²وں“ -->
        </div>
        
        <div class="stats" id="stats">
            <span>و€»ن»»هٹ،ï¼ڑ<strong id="totalTasks">0</strong></span>
            <span>ه·²ه®Œوˆگï¼ڑ<strong id="completedTasks">0</strong></span>
            <span>è؟›è،Œن¸­ï¼ڑ<strong id="pendingTasks">0</strong></span>
        </div>
    </div>

    <script>
        // ن»»هٹ،و•°وچ®ç»“و‍„
        let tasks = [];

        // ن»ژ LocalStorage هٹ è½½ن»»هٹ،
        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            if (saved) {
                tasks = JSON.parse(saved);
            }
        }

        // ن؟‌ه­کن»»هٹ،هˆ° LocalStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // و ¼ه¼ڈهŒ–و—¶é—´
        function formatTime(dateString) {
            if (!dateString) return 'وœھè®°ه½•';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // و¸²وں“ن»»هٹ،هˆ—è،¨
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 2 0 002 2h2a4 4 0 004-2M9 5a2 2 0 012-2h2a4 4 0 014 2"/>
                        </svg>
                        <p>è؟کو²،وœ‰ن»»هٹ،ï¼Œو·»هٹ ن¸€ن¸ھه¼€ه§‹هگ§ï¼پ</p>
                    </div>
                `;
            } else {
                taskList.innerHTML = tasks.map((task, index) => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" class="task-checkbox" 
                            ${task.completed ? 'checked' : ''} 
                            onchange="toggleTask(${index})">
                        <div class="task-content">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            <div class="task-time">
                                <span class="start-time">ًں•گ ه¼€ه§‹ï::${formatTime(task.startTime)}</span>
                                <span class="end-time">âœ… ç»“و‌؛:${task.endTime ? formatTime(task.endTime) : 'و؟¹è،Œن¸­'}</span>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${index})">هˆ é™¤</button>
                    </div>
                `).join('');
            }
            
            updateStats();
        }

        // و›´و–°ç»ںè®،
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }

        // è½¬ن¹‰ HTML éک²و­¢ XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // و·»هٹ ن»»هٹ،
        function addTask(title) {
            const task = {
                title: title,
                completed: false,
                startTime: new Date().toISOString(),
                endTime: null
            };
            tasks.unshift(task); // و–°ن»»هٹ،و·»هٹ هˆ°ه¼€ه¤´
            saveTasks();
            renderTasks();
        }

        // هˆ‡وچ¢ن»»هٹ،çٹ¶و€پ
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            tasks[index].endTime = tasks[index].completed ? new Date().toISOString() : null;
            saveTasks();
            renderTasks();
        }

        // هˆ é™¤ن»»هٹ،
        function deleteTask(index) {
            if (confirm('ç،®ه®ڑè¦پهˆ é™¤è؟™ن¸ھن»»هٹ،هگ—ï¼ں')) {
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            }
        }

        // è،¨هچ•وڈگن؛¤
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            
            if (title) {
                addTask(title);
                input.value = '';
                input.focus();
            }
        });

        // هˆ‌ه§‹هŒ–
        loadTasks();
        renderTasks();
    </script>
</body>
</html>
